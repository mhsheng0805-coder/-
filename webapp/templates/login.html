<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 紡織所業務部門來自民間業務收入明細</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: '微軟正黑體', Arial, sans-serif;
  background: linear-gradient(135deg, #1f4e79 0%, #2e75b6 50%, #1a6b2a 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  width: 100%; max-width: 400px;
  overflow: hidden;
}
.login-header {
  background: linear-gradient(135deg, #1f4e79, #2e75b6);
  color: white; padding: 28px 24px; text-align: center;
}
.login-header h1 { font-size: 18px; margin-bottom: 6px; }
.login-header p { font-size: 13px; opacity: 0.85; }
.login-body { padding: 28px 24px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 6px; }
input[type=text], input[type=password] {
  width: 100%; padding: 10px 36px 10px 12px; border: 1px solid #ddd;
  border-radius: 6px; font-size: 14px; font-family: inherit;
  transition: border 0.2s;
}
.pw-wrap { position: relative; }
.pw-eye {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  cursor: pointer; font-size: 18px; color: #888; user-select: none;
  opacity: .5; line-height: 1;
}
.pw-eye:hover { opacity: 1; }
input:focus { border-color: #2e75b6; outline: none; box-shadow: 0 0 0 3px rgba(46,117,182,0.15); }
.btn-login {
  width: 100%; padding: 12px; background: linear-gradient(135deg, #1f4e79, #2e75b6);
  color: white; border: none; border-radius: 6px; font-size: 15px;
  font-family: inherit; font-weight: bold; cursor: pointer; transition: opacity 0.2s;
}
.btn-login:hover { opacity: 0.9; }
.alert-error {
  background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
  padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px;
}
.forgot-link {
  display: block; text-align: center; margin-top: 14px;
  color: #2e75b6; text-decoration: none; font-size: 13px;
}
.forgot-link:hover { text-decoration: underline; }
.security-note {
  background: #e8f4fd; border-radius: 6px; padding: 10px 14px;
  margin-top: 16px; font-size: 12px; color: #1f4e79;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <h1>📊 紡織所</h1>
    <p>業務部門來自民間業務收入明細</p>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="post" autocomplete="off">
      <input type="hidden" name="_prevent_autofill" value="">
      <div class="form-group">
        <label for="username">帳號</label>
        <!-- autocomplete="new-password" 可防止部分瀏覽器自動填入 -->
        <input type="text" id="username" name="username"
               autocomplete="off" autocorrect="off" autocapitalize="off"
               placeholder="請輸入帳號" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
                 autocomplete="new-password"
                 placeholder="請輸入密碼" required>
          <span class="pw-eye" onclick="togglePw()">👁</span>
        </div>
      </div>
      <div style="font-size:12px; color:#888; margin-bottom:16px; padding: 8px 12px; background:#f8f9fa; border-radius:5px;">
        🔒 本系統不儲存您的帳號密碼，關閉瀏覽器後需重新登入。
      </div>
      <button type="submit" class="btn-login">登入</button>
    </form>
    <a href="/forgot_password" class="forgot-link">忘記密碼？</a>
    <div class="security-note">
      💡 <strong>安全提示：</strong>使用公用電腦時，請在完成後點選「登出」，並確認瀏覽器未儲存密碼。
    </div>
  </div>
</div>
<script>
function togglePw() {
  const inp = document.getElementById('password');
  const eye = document.querySelector('.pw-eye');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.style.opacity = inp.type === 'text' ? '1' : '0.5';
}
// 登入前先設 sessionStorage，讓 base.html 的驗證能通過
document.querySelector('form').addEventListener('submit', function() {
  sessionStorage.setItem('auth_ok', '1');
});
</script>
</body>
</html>
