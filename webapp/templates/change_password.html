{% extends 'base.html' %}
{% block title %}修改密碼{% endblock %}
{% block content %}
<div style="max-width:440px; margin:0 auto;">
  <div class="card">
    <div class="card-header">🔑 修改密碼</div>
    <div class="card-body">
      {% if success %}
        <div class="alert alert-success">✅ 密碼已成功修改！</div>
        <a href="/" class="btn btn-primary">返回首頁</a>
      {% else %}
        {% if error %}
        <div class="alert alert-danger">⚠️ {{ error }}</div>
        {% endif %}
        <form method="post" autocomplete="off" onsubmit="return checkPw()">
          <div class="form-group">
            <label>目前密碼</label>
            <div style="position:relative;">
              <input type="password" id="pw0" name="old_password" autocomplete="current-password"
                     placeholder="請輸入目前密碼" required style="padding-right:36px;">
              <span onclick="togglePw('pw0',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:17px;color:#888;user-select:none;opacity:.5;">👁</span>
            </div>
          </div>
          <div class="form-group">
            <label>新密碼</label>
            <div style="position:relative;">
              <input type="password" id="pw1" name="new_password" autocomplete="new-password"
                     placeholder="至少 6 個字元" required oninput="updateStrength()"
                     style="padding-right:36px;">
              <span onclick="togglePw('pw1',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:17px;color:#888;user-select:none;opacity:.5;">👁</span>
            </div>
            <div id="pw-strength" style="height:4px; border-radius:2px; background:#eee; margin-top:6px; transition:all .3s;"></div>
            <div id="pw-hint" style="font-size:12px; color:#888; margin-top:4px;"></div>
          </div>
          <div class="form-group">
            <label>確認新密碼</label>
            <div style="position:relative;">
              <input type="password" id="pw2" name="new_password2" autocomplete="new-password"
                     placeholder="再次輸入新密碼" required style="padding-right:36px;">
              <span onclick="togglePw('pw2',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:17px;color:#888;user-select:none;opacity:.5;">👁</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; margin-top:8px;">
            <button type="submit" class="btn btn-primary">💾 確認修改</button>
            <a href="/" class="btn" style="background:#ccc; color:#333;">取消</a>
          </div>
        </form>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function updateStrength() {
  const pw = document.getElementById('pw1').value;
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#eee','#dc3545','#ffc107','#28a745','#155724'];
  const labels = ['','弱','普通','強','非常強'];
  const bar = document.getElementById('pw-strength');
  bar.style.background = colors[Math.min(score,4)];
  bar.style.width = (score*20)+'%';
  document.getElementById('pw-hint').textContent = score > 0 ? '密碼強度：'+labels[Math.min(score,4)] : '';
}
function togglePw(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  el.style.opacity = inp.type === 'text' ? '1' : '0.5';
}
function checkPw() {
  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;
  if (p1 !== p2) { alert('兩次輸入的新密碼不一致！'); return false; }
  if (p1.length < 6) { alert('密碼至少需要 6 個字元！'); return false; }
  return true;
}
</script>
{% endblock %}
