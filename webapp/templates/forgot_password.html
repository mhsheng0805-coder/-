<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘記密碼 - 紡織所業務部門來自民間業務收入明細</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: '微軟正黑體', Arial, sans-serif;
  background: linear-gradient(135deg, #1f4e79, #2e75b6);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.box {
  background: white; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  width: 100%; max-width: 440px; overflow: hidden;
}
.box-header {
  background: linear-gradient(135deg, #1f4e79, #2e75b6);
  color: white; padding: 22px 24px;
}
.box-header h1 { font-size: 17px; }
.box-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.box-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
input[type=text] {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd;
  border-radius: 6px; font-size: 14px; font-family: inherit;
}
input:focus { border-color: #2e75b6; outline: none; box-shadow: 0 0 0 3px rgba(46,117,182,0.15); }
.btn { display:block; width:100%; padding:11px; border:none; border-radius:6px;
       font-size:14px; font-family:inherit; font-weight:bold; cursor:pointer; }
.btn-primary { background: linear-gradient(135deg,#1f4e79,#2e75b6); color:white; }
.btn-primary:hover { opacity:0.9; }
.alert { padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:13px; }
.alert-info { background:#d1ecf1; color:#0c5460; border:1px solid #bee5eb; }
.alert-warn { background:#fff3cd; color:#856404; border:1px solid #ffeeba; }
.token-box {
  background: #f0f4f8; border: 1px solid #bdd7ee; border-radius:6px;
  padding: 12px 14px; margin: 12px 0; font-family: monospace;
  font-size: 13px; word-break: break-all; color: #1f4e79;
}
.back-link { display:block; text-align:center; margin-top:14px; color:#2e75b6; font-size:13px; text-decoration:none; }
.back-link:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="box">
  <div class="box-header">
    <h1>🔑 忘記密碼</h1>
    <p>紡織所業務部門來自民間業務收入明細</p>
  </div>
  <div class="box-body">
    {% if token_shown %}
      <div class="alert alert-info">✅ {{ msg }}</div>
      <p style="font-size:13px; color:#555; margin-bottom:8px;">請將以下重設連結傳送給使用者：</p>
      <div class="token-box">
        http://[伺服器IP]:5001/reset_password/{{ token_shown }}
      </div>
      <p style="font-size:12px; color:#888;">⏰ 此連結有效期限為 <strong>1 小時</strong>，過期後需重新申請。</p>
      <div style="margin-top:16px;">
        <a href="/reset_password/{{ token_shown }}" class="btn btn-primary" style="text-decoration:none; text-align:center; display:block; line-height:1.6;">
          直接前往重設密碼
        </a>
      </div>
    {% else %}
      {% if msg %}
      <div class="alert alert-warn">⚠️ {{ msg }}</div>
      {% endif %}
      <p style="font-size:13px; color:#666; margin-bottom:18px;">
        請輸入您的帳號，系統將產生密碼重設連結。
      </p>
      <form method="post" autocomplete="off">
        <div class="form-group">
          <label>帳號</label>
          <input type="text" name="username" autocomplete="off" placeholder="請輸入帳號" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary">產生重設連結</button>
      </form>
    {% endif %}
    <a href="/login" class="back-link">← 返回登入頁面</a>
  </div>
</div>
</body>
</html>
