<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重設密碼 - 紡織所業務部門來自民間業務收入明細</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: '微軟正黑體', Arial, sans-serif;
  background: linear-gradient(135deg, #1f4e79, #2e75b6);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.box {
  background: white; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  width: 100%; max-width: 400px; overflow: hidden;
}
.box-header {
  background: linear-gradient(135deg, #1f4e79, #2e75b6);
  color: white; padding: 22px 24px;
}
.box-header h1 { font-size: 17px; }
.box-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.box-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
input[type=password], input[type=text].pw-input {
  width: 100%; padding: 10px 40px 10px 12px; border: 1px solid #ddd;
  border-radius: 6px; font-size: 14px; font-family: inherit;
}
input:focus { border-color: #2e75b6; outline: none; box-shadow: 0 0 0 3px rgba(46,117,182,0.15); }
.pw-wrap { position: relative; }
.pw-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  cursor: pointer; font-size: 17px; user-select: none; color: #888; line-height:1; }
.btn { width:100%; padding:11px; border:none; border-radius:6px;
       font-size:14px; font-family:inherit; font-weight:bold; cursor:pointer; }
.btn-primary { background: linear-gradient(135deg,#1f4e79,#2e75b6); color:white; }
.alert { padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:13px; }
.alert-error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
.alert-success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
.hint { font-size:12px; color:#888; margin-top:5px; }
.back-link { display:block; text-align:center; margin-top:14px; color:#2e75b6; font-size:13px; text-decoration:none; }
.back-link:hover { text-decoration:underline; }
.pw-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
</style>
</head>
<body>
<div class="box">
  <div class="box-header">
    <h1>🔒 重設密碼</h1>
    <p>紡織所業務部門來自民間業務收入明細</p>
  </div>
  <div class="box-body">
    {% if success %}
      <div class="alert alert-success">
        ✅ 密碼已成功重設！請使用新密碼登入。
      </div>
      <a href="/login" class="btn btn-primary" style="display:block; text-align:center; text-decoration:none; line-height:1.8;">前往登入</a>
    {% elif error and not token %}
      <div class="alert alert-error">⚠️ {{ error }}</div>
      <a href="/forgot_password" class="back-link">← 重新申請重設連結</a>
    {% else %}
      {% if error %}
      <div class="alert alert-error">⚠️ {{ error }}</div>
      {% endif %}
      <p style="font-size:13px; color:#666; margin-bottom:18px;">
        正在為帳號 <strong>{{ username }}</strong> 設定新密碼。
      </p>
      <form method="post" autocomplete="off" onsubmit="return checkPw()">
        <div class="form-group">
          <label>新密碼</label>
          <div class="pw-wrap">
            <input type="password" id="pw1" name="password"
                   autocomplete="new-password" placeholder="至少 6 個字元" required
                   oninput="updateStrength()">
            <span class="pw-eye" onclick="togglePw('pw1',this)">👁</span>
          </div>
          <div id="pw-strength" class="pw-strength" style="background:#eee;"></div>
          <div id="pw-hint" class="hint"></div>
        </div>
        <div class="form-group">
          <label>確認新密碼</label>
          <div class="pw-wrap">
            <input type="password" id="pw2" name="password2"
                   autocomplete="new-password" placeholder="再次輸入新密碼" required>
            <span class="pw-eye" onclick="togglePw('pw2',this)">👁</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">確認重設密碼</button>
      </form>
      <a href="/login" class="back-link">← 返回登入</a>
    {% endif %}
  </div>
</div>
<script>
function updateStrength() {
  const pw = document.getElementById('pw1').value;
  const bar = document.getElementById('pw-strength');
  const hint = document.getElementById('pw-hint');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#eee','#dc3545','#ffc107','#28a745','#155724'];
  const labels = ['','弱','普通','強','非常強'];
  bar.style.background = colors[Math.min(score, 4)];
  bar.style.width = (score * 20) + '%';
  hint.textContent = score > 0 ? '密碼強度：' + labels[Math.min(score, 4)] : '';
}
function togglePw(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  el.style.opacity = inp.type === 'text' ? '1' : '0.5';
}
function checkPw() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1 !== pw2) { alert('兩次輸入的密碼不一致！'); return false; }
  if (pw1.length < 6) { alert('密碼至少需要 6 個字元！'); return false; }
  return true;
}
</script>
</body>
</html>
